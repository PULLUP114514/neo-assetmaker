name: Build Application

on:
  workflow_call:
    outputs:
      artifact_run_id:
        description: 'Workflow run ID that uploaded the build artifact'
        value: ${{ jobs.build.outputs.artifact_run_id }}
    inputs:
      skip_flasher:
        type: boolean
        default: false
        description: '跳过 epass_flasher/bin 检查'
      obfuscate:
        type: boolean
        default: false
        description: 'Use PyArmor to obfuscate first-party Python sources'
      uv_sync_mode:
        type: string
        default: "locked"
        description: 'uv sync 模式: "locked"（严格校验锁文件）或 "frozen"（跳过校验）'
      version_override:
        type: string
        default: ""
        description: '非空时在构建前同步版本号到各配置文件'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90
    outputs:
      artifact_run_id: ${{ steps.expose-run-id.outputs.artifact_run_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      # ========== 可选：版本同步（仅 release 时传入） ==========

      - name: Sync version to build files
        if: inputs.version_override != ''
        shell: pwsh
        run: |
          $version = "${{ inputs.version_override }}"
          Write-Host "Syncing version to $version"

          # Update installer.iss
          $installerIss = Get-Content installer.iss -Raw
          $installerIss = $installerIss -replace '#define MyAppVersion "[^"]+"', "#define MyAppVersion `"$version`""
          Set-Content installer.iss $installerIss -NoNewline
          Write-Host "Updated installer.iss"

          # Update config/constants.py (运行时版本显示)
          $constantsPy = Get-Content config/constants.py -Raw
          $constantsPy = $constantsPy -replace 'APP_VERSION = "[^"]+"', "APP_VERSION = `"$version`""
          Set-Content config/constants.py $constantsPy -NoNewline
          Write-Host "Updated config/constants.py"

          # Update pyproject.toml (包元数据)
          $pyprojectToml = Get-Content pyproject.toml -Raw
          $pyprojectToml = $pyprojectToml -replace '(?m)^version = "[^"]+"', "version = `"$version`""
          Set-Content pyproject.toml $pyprojectToml -NoNewline
          Write-Host "Updated pyproject.toml"

          # Update simulator/Cargo.toml (Rust 模拟器版本)
          $cargoToml = Get-Content simulator/Cargo.toml -Raw
          $cargoToml = $cargoToml -replace '(?m)^version = "[^"]+"', "version = `"$version`""
          Set-Content simulator/Cargo.toml $cargoToml -NoNewline
          Write-Host "Updated simulator/Cargo.toml"

      # ========== Rust 模拟器编译 ==========

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "simulator -> target"

      - name: Build Rust Simulator
        shell: pwsh
        run: |
          cd simulator
          cargo fmt --check
          cargo test
          cargo build --release --locked
          if (Test-Path "target\release\arknights_pass_simulator.exe") {
            Write-Host "Simulator built successfully"
          } else {
            Write-Error "Simulator build failed!"
            exit 1
          }

      # ========== Python 应用编译 ==========

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.10"

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ inputs.uv_sync_mode }}" = "frozen" ]; then
            uv sync --frozen
          else
            uv sync --locked
          fi
          if [ "${{ inputs.obfuscate }}" = "true" ]; then
            uv pip install "pyarmor>=8,<9"
          fi
          uv run --no-sync python -c "import OpenGL, cv2, PyQt6, numpy, requests; import core.rndis_device_service, core.http_remote_service, gui.workers.rndis_http_workers; print('All packages OK')"

      - name: Run Python tests
        shell: bash
        run: |
          uv run --no-sync python -m compileall main.py config core gui utils _mext build.py tests
          uv run --no-sync python -m unittest discover -s tests -p "test_*.py"

      - name: Cache media tools
        uses: actions/cache@v4
        id: cache-media-tools
        with:
          path: media-tools-v1.0.7z
          key: media-tools-v1.0.7z

      - name: Download media tools on cache miss
        if: steps.cache-media-tools.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Write-Host "Cache miss — downloading media tools from repository release..."
          $repo = "${{ github.repository }}"
          $tag = "media-tools-v1.0"
          $asset = "media-tools-v1.0.7z"
          $url = "https://github.com/$repo/releases/download/$tag/$asset"

          Write-Host "Downloading from: $url"
          try {
            Invoke-WebRequest -Uri $url -OutFile media-tools-v1.0.7z -MaximumRetryCount 3
            $fileSize = (Get-Item media-tools-v1.0.7z).Length / 1MB
            Write-Host "✓ Downloaded successfully: $($fileSize.ToString('F2')) MB"
          } catch {
            Write-Error "Failed to download media tools: $_"
            Write-Host "URL attempted: $url"
            Write-Host ""
            Write-Host "请先创建 release 并上传文件："
            Write-Host "1. 访问 https://github.com/$repo/releases/new"
            Write-Host "2. Tag: media-tools-v1.0"
            Write-Host "3. 上传 media-tools-v1.0.7z"
            exit 1
          }

      - name: Extract media tools
        shell: pwsh
        run: |
          if (-not (Test-Path "media-tools-v1.0.7z")) {
            Write-Error "Archive not found after cache restore/download"
            exit 1
          }

          Write-Host "Extracting media tools..."
          7z x media-tools-v1.0.7z -y

          # Verify critical binaries exist
          $requiredTools = @("mpv.exe", "VSPipe.exe", "x264-7mod.exe")
          foreach ($tool in $requiredTools) {
            $path = "tools/media/$tool"
            if (-not (Test-Path $path)) {
              Write-Error "Required tool not found: $path"
              exit 1
            }
            Write-Host "✓ Found: $path"
          }

          $totalSize = (Get-ChildItem tools/media -Recurse | Measure-Object Length -Sum).Sum / 1MB
          Write-Host "Media tools extracted successfully ($($totalSize.ToString('F2')) MB)"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Build with cx_Freeze and Inno Setup
        shell: pwsh
        run: |
          $buildArgs = @()
          if ("${{ inputs.skip_flasher }}" -eq "true") { $buildArgs += "--skip-flasher" }
          if ("${{ inputs.obfuscate }}" -eq "true") { $buildArgs += "--obfuscate" }
          uv run --no-sync python build.py @buildArgs
        env:
          # qfluentwidgets 等第三方库触发的 SyntaxWarning
          PYTHONWARNINGS: "ignore::SyntaxWarning"

      - name: Debug exe outputs
        shell: pwsh
        run: |
          Write-Host "==== dist contents ===="
          if (Test-Path "dist") {
            Get-ChildItem -Recurse "dist" | Select-Object FullName, Length
          } else {
            Write-Host "dist directory not found"
          }
          Write-Host "==== cx_Freeze contents ===="
          if (Test-Path "ArknightsPassMaker") {
            Get-ChildItem -Recurse "ArknightsPassMaker" -Filter *.exe | Select-Object FullName, Length
          } else {
            Write-Host "ArknightsPassMaker directory not found"
          }
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArknightsPassMaker-Build
          path: |
            dist/*.exe
          if-no-files-found: error

      - name: Expose artifact run ID
        id: expose-run-id
        shell: pwsh
        run: |
          "artifact_run_id=${{ github.run_id }}" >> $env:GITHUB_OUTPUT
