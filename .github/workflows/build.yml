name: Build

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:
    inputs:
      obfuscate:
        description: 'Use PyArmor obfuscation for this manual build'
        required: false
        type: boolean
        default: false

jobs:
  build:
    uses: ./.github/workflows/build-app.yml
    with:
      skip_flasher: true
      uv_sync_mode: "locked"
      obfuscate: ${{ github.event_name == 'workflow_dispatch' && inputs.obfuscate }}
