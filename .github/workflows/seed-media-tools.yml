name: Seed Media Tools Cache

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: windows-latest
    steps:
      - name: Download media tools archive
        shell: pwsh
        run: |
          # Download from upstream repository release
          $url = "https://github.com/rhodesepass/neo-assetmaker/releases/download/media-tools-v1.0/media-tools-v1.0.7z"
          Write-Host "Downloading media tools from upstream: $url"
          Invoke-WebRequest -Uri $url -OutFile media-tools-v1.0.7z -MaximumRetryCount 3

          if (Test-Path media-tools-v1.0.7z) {
            $fileSize = (Get-Item media-tools-v1.0.7z).Length / 1MB
            Write-Host "✓ Archive downloaded: $($fileSize.ToString('F2')) MB"
          } else {
            Write-Error "Failed to download archive"
            exit 1
          }

      - name: Save to cache
        uses: actions/cache/save@v4
        with:
          path: media-tools-v1.0.7z
          key: media-tools-v1.0.7z
