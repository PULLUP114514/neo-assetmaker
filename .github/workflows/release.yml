name: Auto Release

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/CHANGELOG.md'
  workflow_dispatch:
    inputs:
      force_release:
        description: '强制发布（跳过版本变更检查）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      version_changed: ${{ steps.check-change.outputs.changed }}
      tag_exists: ${{ steps.check-tag.outputs.exists }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get current version from CHANGELOG
        id: get-version
        run: |
          VERSION=$(grep -oP '### v\K[0-9]+\.[0-9]+\.[0-9]+' docs/CHANGELOG.md | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Validate version consistency
        run: |
          CHANGELOG_VERSION=$(grep -oP '### v\K[0-9]+\.[0-9]+\.[0-9]+' docs/CHANGELOG.md | head -1)
          PYPROJECT_VERSION=$(python - <<'PY'
          import re
          print(re.search(r'(?m)^version = "([^"]+)"', open('pyproject.toml', encoding='utf-8').read()).group(1))
          PY
          )
          APP_VERSION=$(python - <<'PY'
          import re
          print(re.search(r'APP_VERSION = "([^"]+)"', open('config/constants.py', encoding='utf-8').read()).group(1))
          PY
          )
          INSTALLER_VERSION=$(grep -oP '#define MyAppVersion "\K[^"]+' installer.iss | head -1)
          SIMULATOR_VERSION=$(grep -oP '^version = "\K[^"]+' simulator/Cargo.toml | head -1)
          echo "CHANGELOG=$CHANGELOG_VERSION PYPROJECT=$PYPROJECT_VERSION APP=$APP_VERSION INSTALLER=$INSTALLER_VERSION SIMULATOR=$SIMULATOR_VERSION"
          test "$CHANGELOG_VERSION" = "$PYPROJECT_VERSION"
          test "$CHANGELOG_VERSION" = "$APP_VERSION"
          test "$CHANGELOG_VERSION" = "$INSTALLER_VERSION"
          test "$CHANGELOG_VERSION" = "$SIMULATOR_VERSION"

      - name: Check if version changed
        id: check-change
        run: |
          CURRENT_VERSION=$(grep -oP '### v\K[0-9]+\.[0-9]+\.[0-9]+' docs/CHANGELOG.md | head -1)

          # 获取最新的 tag 版本号（而不是上一次提交）
          # 参考: https://git-scm.com/docs/git-describe
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          LATEST_TAG_VERSION=${LATEST_TAG#v}  # 去掉 v 前缀

          echo "Current version in CHANGELOG: $CURRENT_VERSION"
          echo "Latest tag version: $LATEST_TAG_VERSION"

          if [ -n "$CURRENT_VERSION" ] && [ "$CURRENT_VERSION" != "$LATEST_TAG_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed: $LATEST_TAG_VERSION -> $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version not changed (current: $CURRENT_VERSION, latest tag: $LATEST_TAG_VERSION)"
          fi

      - name: Check if tag exists
        id: check-tag
        run: |
          VERSION=$(grep -oP '### v\K[0-9]+\.[0-9]+\.[0-9]+' docs/CHANGELOG.md | head -1)
          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION does not exist"
          fi

  build:
    needs: check-version
    if: |
      (needs.check-version.outputs.version_changed == 'true' && needs.check-version.outputs.tag_exists == 'false') ||
      (github.event_name == 'workflow_dispatch' && inputs.force_release)
    uses: ./.github/workflows/build-app.yml
    with:
      skip_flasher: false
      uv_sync_mode: "locked"
      obfuscate: true
      version_override: ${{ needs.check-version.outputs.version }}

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ArknightsPassMaker-Build
          path: dist
          github-token: ${{ github.token }}
          run-id: ${{ needs.build.outputs.artifact_run_id }}

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd dist
          sha256sum *.exe > SHA256SUMS
          cat SHA256SUMS

      - name: Extract changelog for current version
        id: changelog
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          # 转义版本号中的 . (正则通配符 → 字面量)
          VERSION_ESC=$(echo "$VERSION" | sed 's/\./\\./g')
          VERSION_HEADER_RE="^### v${VERSION_ESC}([^0-9.]|$)"

          # 使用 awk 状态机精确提取当前版本的更新日志
          # - 找到当前版本头 → 开始输出，允许标题带“测试预览版”等后缀
          # - 遇到下一个版本头 → 立即退出
          CHANGELOG=$(awk -v header_re="$VERSION_HEADER_RE" '
            $0 ~ header_re { found=1 }
            found && /^### v[0-9]/ && $0 !~ header_re { exit }
            found { print }
          ' docs/CHANGELOG.md)

          if [ -z "$CHANGELOG" ]; then
            echo "::warning::未能从 CHANGELOG 中提取 v${VERSION} 的内容"
          fi

          CURRENT_HEADER=$(grep -m1 -E "$VERSION_HEADER_RE" docs/CHANGELOG.md || true)
          if echo "$CURRENT_HEADER" | grep -Eiq '(测试预览版|预览版|preview|pre-release|prerelease|alpha|beta|rc)'; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          echo "Extracted changelog for v${VERSION}:"
          echo "$CHANGELOG"
          echo "Prerelease: $PRERELEASE"

          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
            echo "PRERELEASE=$PRERELEASE"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: |
            dist/*.exe
            dist/SHA256SUMS
          draft: false
          prerelease: ${{ steps.changelog.outputs.PRERELEASE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
